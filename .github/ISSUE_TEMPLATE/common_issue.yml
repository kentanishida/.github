name: Issue
description: 共通テンプレート（タイトル / ラベル / 背景 / 何をするのか / どうやってやるのか）
title: "[タイトル]"
body:
  - type: textarea
    id: labels
    attributes:
      label: ラベル
      description: |
        このIssueに付与すべきラベルを記載してください。優先度のラベルは必須です。
        - 優先度 (必須): priority-1 (低) 〜 priority-7 (高)
      placeholder: |
        - priority-5
    validations:
      required: true

  - type: textarea
    id: background
    attributes:
      label: 背景
      description: なぜこのIssueが必要か（課題・発生状況・ビジネス/ユーザー影響など）
      placeholder: |
        例：
        現在〇〇機能で△△な問題が発生しており、ユーザーが□□できない。売上やUXに⭐︎⭐︎な影響があるため対応が必要。
    validations:
      required: true

  - type: textarea
    id: what
    attributes:
      label: 何をするのか
      description: このIssueで完了すべき成果物・スコープ・アウトカムを明確にしてください
      placeholder: |
        例：
        - 新しいAPIエンドポイント /v1/xxx を追加し△△のデータを返せるようにする
        - 画面AでBの状態を表示できる
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: 完了条件
      description: このIssueが完了と判断できる客観的な条件（受け入れ基準 / 検証方法）
      placeholder: |
        例：
        - [ ] テストが通る
        - [ ] APIが期待通りのレスポンス（200 / 想定JSON構造）を返す
        - [ ] UIで○○が表示される
        - [ ] エラーログが出力されない
        - [ ] ドキュメント（README / ADR）が更新されている
    validations:
      required: true

  - type: textarea
    id: how
    attributes:
      label: どうやってやるのか
      description: 想定アプローチ、分解タスクなど
      placeholder: |
        例：
        - [ ] モデルを拡張する
        - [ ] マイグレーションを行う
        - [ ] 〇〇entity を作る
        - [ ] △△client に〇〇を作る
        - [ ] useCase を作る
      render: markdown