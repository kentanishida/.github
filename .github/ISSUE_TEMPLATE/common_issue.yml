name: Issue
description: 共通テンプレート（タイトル / ラベル / 背景 / 実行案の検討 / 最終決定と理由）
title: "[タイトル]"
body:
  - type: textarea
    id: labels
    attributes:
      label: ラベル
      description: |
        このIssueに付与すべきラベルを記載してください。優先度のラベルは必須です。
        - 優先度 (必須): priority-1 (低) 〜 priority-7 (高)
          - 目安: 1〜2 = いつか対応, 3〜4 = 今月中に対応, 5〜6 = 今週中に対応, 7 = 即時対応
      placeholder: |
        - priority-5
    validations:
      required: true

  - type: textarea
    id: background
    attributes:
      label: 背景
      description: |
        なぜこのIssueが必要か（課題・発生状況・ビジネス/ユーザー影響など）を記載してください。
        最終的にどうなっていれば解決といえるか（ゴール）も含めると、実行案の検討がしやすくなります。
      placeholder: |
        例：
        現在〇〇機能で△△な問題が発生しており、ユーザーが□□できない。売上やユーザー体験に◇◇な影響があるため対応が必要。
        ゴール: ユーザーが□□を問題なく完了できる状態にする。
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 実行案の検討
      description: |
        考えられる手法をそれぞれ詳細に記載してください。各手法には「何をするのか」「どう実装するか」「完了条件」を含めます。
        1つしか思いつかない場合は1つだけでも構いません。ただし「他に方法はないか」を一度考えることで、選択の質が上がります。
        下記の例はあくまでフォーマットの参考です。自分のプロジェクトの内容に合わせて書き換えてください。
      placeholder: |
        ## 手法A: （手法名を記載）

        **概要:** 一文で手法の要点を記載

        **詳細説明:**
        なぜこの手法が有効か、背景や仕組みを記載

        **実際の実装方法:**
        1. ステップ1
        2. ステップ2

        **メリット:**
        - ...

        **デメリット:**
        - ...

        **この手法の完了条件:**
        - [ ] 条件1
        - [ ] 条件2

        ---

        ## 手法B: （別の手法名を記載）

        （手法A と同じ構成で記載）
    validations:
      required: true

  - type: textarea
    id: decision
    attributes:
      label: 最終的な決定とその理由
      description: |
        上記の手法のうち、どれを採用し、なぜその判断に至ったかを記載してください。
        採用する手法に記載した完了条件が、この Issue 全体の完了条件になります。
        判断の根拠（技術的制約、コスト、チーム状況など）があると、後から見返したときに有用です。
      placeholder: |
        **採用する手法:** 手法X（手法名）

        **理由:**
        判断の根拠を記載（技術的制約、コスト、チーム状況など）

        **この Issue の完了条件（手法X の完了条件を採用）:**
        - [ ] 条件1
        - [ ] 条件2
    validations:
      required: false
