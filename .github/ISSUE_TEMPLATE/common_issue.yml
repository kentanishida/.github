name: Issue
description: 共通テンプレート（タイトル / ラベル / 背景 / 何をするのか / 代替案の検討 / 採用理由 / どうやってやるのか）
title: "[タイトル]"
body:
  - type: textarea
    id: labels
    attributes:
      label: ラベル
      description: |
        このIssueに付与すべきラベルを記載してください。優先度のラベルは必須です。
        - 優先度 (必須): priority-1 (低) 〜 priority-7 (高)
      placeholder: |
        - priority-5
    validations:
      required: true

  - type: textarea
    id: background
    attributes:
      label: 背景
      description: なぜこのIssueが必要か（課題・発生状況・ビジネス/ユーザー影響など）
      placeholder: |
        例：
        現在〇〇機能で△△な問題が発生しており、ユーザーが□□できない。売上やUXに⭐︎⭐︎な影響があるため対応が必要。
    validations:
      required: true

  - type: textarea
    id: what
    attributes:
      label: 何をするのか
      description: このIssueで完了すべき成果物・スコープ・アウトカムを明確にしてください
      placeholder: |
        例：
        - 新しいAPIエンドポイント /v1/xxx を追加し△△のデータを返せるようにする
        - 画面AでBの状態を表示できる
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: 完了条件
      description: このIssueが完了と判断できる客観的な条件（受け入れ基準 / 検証方法）
      placeholder: |
        例：
        - [ ] テストが通る
        - [ ] APIが期待通りのレスポンス（200 / 想定JSON構造）を返す
        - [ ] UIで○○が表示される
        - [ ] エラーログが出力されない
        - [ ] ドキュメント（README / ADR）が更新されている
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 代替案の検討
      description: |
        検討した手法を比較してください。1つしか思いつかない場合でも「他に方法はないか」を考えることで、選択の質が上がります。
      placeholder: |
        例：
        | 手法 | メリット | デメリット |
        |------|---------|-----------|
        | A: axios + keepAlive | 既存コードの変更が少ない | axios 依存が残る |
        | B: fetch API に移行 | Node.js 標準で依存なし | 全HTTPクライアントの書き換えが必要 |
        | C: undici | 高パフォーマンス | 学習コストがある |
      render: markdown
    validations:
      required: true

  - type: textarea
    id: decision
    attributes:
      label: 採用理由
      description: |
        上記の代替案のうち、どれを採用し、なぜその判断に至ったかを記載してください。
        判断の根拠（技術的制約、コスト、チーム状況など）があると、後から見返したときに有用です。
      placeholder: |
        例：
        手法Aを採用する。理由は、既存コードへの影響が最小限で、現時点のトラフィック規模では十分な性能が得られるため。
        手法Bは将来的に検討するが、現フェーズでは移行コストが見合わない。
    validations:
      required: true

  - type: textarea
    id: how
    attributes:
      label: どうやってやるのか
      description: 採用した手法の具体的な実装アプローチ、分解タスクなど
      placeholder: |
        例：
        - [ ] モデルを拡張する
        - [ ] マイグレーションを行う
        - [ ] 〇〇entity を作る
        - [ ] △△client に〇〇を作る
        - [ ] useCase を作る
      render: markdown